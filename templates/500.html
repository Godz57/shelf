{% extends "base.html" %}

{% block title %}Server error{% endblock %}

{% block content %}
<section class="not-found">
  <p class="hero-kicker not-found-kicker">500</p>
  <h1>Something went wrong on our shelf</h1>
  <p class="lede">
    The server hit an unexpected error. The catalog is still here —
    try the home page, or come back in a moment.
  </p>
  <div class="hero-actions">
    <a class="btn" href="{% url 'catalog:home' %}">Back home</a>
    <a class="btn btn-outline" href="{% url 'catalog:book_list' %}">Browse books</a>
  </div>
</section>
{% endblock %}
