{% extends "base.html" %}

{% block title %}Sign up{% endblock %}

{% block content %}
<h1>Create an account</h1>
<p class="lede">Save books to your personal shelf.</p>

<form class="auth-form" method="post" action="{% url 'catalog:signup' %}">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {% for field in form %}
    <label>
      {{ field.label }}
      {{ field }}
      {% if field.errors %}<span class="field-error">{{ field.errors|striptags }}</span>{% endif %}
      {% if field.help_text %}<span class="help">{{ field.help_text|safe }}</span>{% endif %}
    </label>
  {% endfor %}
  <button type="submit" class="btn">Sign up</button>
</form>
<p class="hint">Already have an account? <a href="{% url 'login' %}">Log in</a>.</p>
{% endblock %}
