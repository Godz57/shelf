{% extends "base.html" %}

{% block title %}Log in{% endblock %}

{% block content %}
<h1>Log in</h1>

<form class="auth-form" method="post" action="{% url 'login' %}">
  {% csrf_token %}
  {{ form.non_field_errors }}
  {% for field in form %}
    <label>
      {{ field.label }}
      {{ field }}
      {% if field.errors %}<span class="field-error">{{ field.errors|striptags }}</span>{% endif %}
    </label>
  {% endfor %}
  <input type="hidden" name="next" value="{{ next }}">
  <button type="submit" class="btn">Log in</button>
</form>
<p class="hint">No account yet? <a href="{% url 'catalog:signup' %}">Sign up</a>.</p>
{% endblock %}
