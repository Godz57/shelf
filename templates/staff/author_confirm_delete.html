{% extends "staff/base_staff.html" %}

{% block staff_title %}Delete author{% endblock %}

{% block staff_content %}
<header class="page-header">
  <h1>Delete author?</h1>
  <p class="lede">Remove <strong>{{ object.name }}</strong> from the catalog.</p>
</header>

<form method="post" class="manage-form">
  {% csrf_token %}
  <div class="manage-form-actions">
    <button type="submit" class="btn btn-danger">Yes, delete author</button>
    <a class="btn btn-outline" href="{% url 'staff:author_list' %}">Cancel</a>
  </div>
</form>
{% endblock %}
