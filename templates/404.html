{% extends "base.html" %}

{% block title %}Not found{% endblock %}

{% block content %}
<section class="not-found">
  <p class="hero-kicker not-found-kicker">404</p>
  <h1>This page wandered off the shelf</h1>
  <p class="lede">
    The path you asked for is not in the catalog. It may have never been bound —
    or it slipped between the pages.
  </p>
  <div class="hero-actions">
    <a class="btn" href="{% url 'catalog:home' %}">Back home</a>
    <a class="btn btn-outline" id="find-me-a-book" href="{% url 'catalog:book_list' %}">Find me a book</a>
  </div>
</section>
<script>
  (function () {
    var btn = document.getElementById("find-me-a-book");
    if (!btn) return;
    btn.addEventListener("click", function (e) {
      e.preventDefault();
      fetch("/api/books/pick/")
        .then(function (r) { return r.ok ? r.json() : null; })
        .then(function (book) {
          if (book && book.slug) window.location.href = "/books/" + book.slug + "/";
          else window.location.href = btn.getAttribute("href");
        })
        .catch(function () { window.location.href = btn.getAttribute("href"); });
    });
  })();
</script>
{% endblock %}
