name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Force SQLite for CI (ignore any DATABASE_URL secrets)
      DATABASE_URL: ""
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "ci-test-secret-not-for-production"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test --verbosity=1

      - name: Django system check
        run: python manage.py check
